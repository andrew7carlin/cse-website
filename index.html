<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preload" as="image" href="/hero-poster.webp" fetchpriority="high" />
  <link rel="preload" href="/fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin>
  <!--
    DO NOT add a static title or meta description tag here.

    SEO.jsx (src/components/common/SEO.jsx) renders the per-route title,
    meta description, OG, Twitter, and canonical tags, and React 19 hoists
    them into the head. Build-time prerender then captures that rendered
    head for every route so crawlers see real per-page meta.

    If we ALSO ship a static title or meta description from this template,
    every prerendered page ends up with TWO of each in the head (the static
    one plus the React-hoisted one). Screaming Frog and Google flag this as
    duplicate metadata, which it is. Don't reintroduce them.

    For the home page (not prerendered): scripts/prerender.mjs injects the
    captured home title, meta, canonical, and JSON-LD into dist/index.html's
    head at build time, so the served home shell still has real per-page
    metadata for non-JS crawlers.

    NOTE: keep this comment free of literal angle-bracket tag syntax. The
    prerender injects content by string-matching the root container element,
    and any tag-like text in a comment can become a false match target (and
    can mis-parse in crawlers). Describe tags in prose, never as markup.
  -->
</head>

<body>
  <!--
    Home-page crawlable body content is NOT inlined here in the source
    template (it would then ship on every prerendered page). Instead,
    scripts/prerender.mjs splices scripts/home-fallback.html — an
    off-screen, ~650-word home-seo-content block (one H1 heading plus
    section H2 headings) — into dist/index.html ONLY, immediately ahead of
    the root container element. That block is what non-JS crawlers and AI
    search engines read. main.jsx removes it the instant the React app
    mounts, so JS users never see or retain it (no flash, no layout shift,
    no duplicate headings at runtime).

    The short noscript below is the last-resort fallback for the rare
    SIGHTED visitor with JavaScript disabled (the home-seo-content block is
    clipped off-screen, so they can't see it). It deliberately has no H1
    heading so it never competes with the real per-page heading. Keep
    contacts here in sync with src/data/locations.js.

    NOTE: keep this comment free of literal angle-bracket tag syntax (see
    the head comment above for why).
  -->
  <noscript>
    <p>
      <strong>Canyon State Enterprises</strong> is a multi-trade construction
      company serving Arizona, Nevada, Utah, and New Mexico &mdash; roofing,
      stucco, HVAC, plumbing, masonry, metals, and full general contracting.
      This site works best with JavaScript enabled.
    </p>
    <p>
      Call our Kingman headquarters at <a href="tel:9287579003">(928) 757-9003</a>,
      Phoenix at <a href="tel:6025276050">(602) 527-6050</a>, or Nevada at
      <a href="tel:7026592819">(702) 659-2819</a>, or email
      <a href="mailto:office@canyonstateaz.com">office@canyonstateaz.com</a>.
    </p>
    <p>
      <a href="/about">About</a> &middot;
      <a href="/services">Trades &amp; Services</a> &middot;
      <a href="/portfolio">Portfolio</a> &middot;
      <a href="/where">Where We Work</a> &middot;
      <a href="/blog">Insights</a> &middot;
      <a href="/contact">Contact</a>
    </p>
  </noscript>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
