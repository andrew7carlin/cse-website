<?xml version="1.0" encoding="UTF-8"?>
<!--
  Subtle desert horizon used as a section divider on blog post <h2>s.
  Two mountain ridge lines (far + near) plus four saguaro silhouettes.
  Uses brand copper (#A04921) at low opacity so it reads as decoration
  not illustration. preserveAspectRatio="none" lets CSS stretch it
  full-width regardless of viewport.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 36" preserveAspectRatio="none" aria-hidden="true">

  <!-- Far ridge (lighter, thinner) -->
  <path
    d="M 0 26 L 70 18 L 150 24 L 220 14 L 300 22 L 400 12 L 480 20 L 570 14 L 670 24 L 760 16 L 860 26 L 960 18 L 1060 26 L 1200 20"
    stroke="#A04921"
    stroke-opacity="0.18"
    stroke-width="1"
    fill="none"
    stroke-linejoin="round"
    stroke-linecap="round"
    vector-effect="non-scaling-stroke" />

  <!-- Near ridge (slightly darker, more defined) -->
  <path
    d="M 0 30 L 80 24 L 165 30 L 245 22 L 335 28 L 425 18 L 510 26 L 600 22 L 690 30 L 790 22 L 890 30 L 985 24 L 1085 32 L 1200 26"
    stroke="#A04921"
    stroke-opacity="0.28"
    stroke-width="1.2"
    fill="none"
    stroke-linejoin="round"
    stroke-linecap="round"
    vector-effect="non-scaling-stroke" />

  <!-- Saguaros: rounded trunks + 1-2 arms each, scattered across the horizon.
       Coordinates anchor each cactus base near the near-ridge line.
       Drawn with rect + rounded corners for clean rendering at any scale. -->
  <g fill="#A04921" fill-opacity="0.36">

    <!-- Saguaro #1 — small, two arms, around x=190 -->
    <rect x="188" y="14" width="3.6" height="18" rx="1.8" />
    <rect x="182" y="20" width="2.6" height="12" rx="1.3" />
    <rect x="193" y="22" width="2.6" height="10" rx="1.3" />

    <!-- Saguaro #2 — tallest, three arms, around x=420 -->
    <rect x="418" y="6" width="4" height="26" rx="2" />
    <rect x="412" y="12" width="3" height="20" rx="1.5" />
    <rect x="423" y="14" width="3" height="18" rx="1.5" />
    <rect x="406" y="20" width="2.4" height="12" rx="1.2" />

    <!-- Saguaro #3 — medium, single arm, around x=720 -->
    <rect x="718" y="12" width="3.4" height="20" rx="1.7" />
    <rect x="723" y="18" width="2.6" height="14" rx="1.3" />

    <!-- Saguaro #4 — small, two arms, around x=1010 -->
    <rect x="1008" y="14" width="3.4" height="18" rx="1.7" />
    <rect x="1002" y="20" width="2.6" height="12" rx="1.3" />
    <rect x="1013" y="22" width="2.4" height="10" rx="1.2" />

  </g>
</svg>
