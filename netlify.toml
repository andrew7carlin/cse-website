[build]
  publish = "dist"
  # Chrome install is idempotent: fast no-op when cached, downloads when
  # missing. We need it explicit because Netlify caches node_modules but
  # NOT puppeteer's default Chrome cache (~/.cache/puppeteer), so a cache
  # hit on node_modules skips the postinstall that would otherwise grab
  # Chrome. Without this, the postbuild prerender step fails with
  # "Could not find Chrome".
  command = "npx puppeteer browsers install chrome && npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--prefer-offline=false"
  # Tell puppeteer to download Chrome INSIDE node_modules so Netlify's
  # node_modules cache preserves it between builds. The default cache
  # path (~/.cache/puppeteer) is outside the cache scope and gets blown
  # away every build.
  PUPPETEER_CACHE_DIR = "/opt/build/repo/node_modules/.cache/puppeteer"

# Disable Netlify's "pretty URL" auto-redirect from /about → /about/.
# Our sitemap, canonicals, and prerender all use the no-slash form
# (/about, /services/roofing, /locations/las-vegas-nv). Netlify's default
# pretty-URL behavior 301-redirects every no-slash request to a slashed
# version, which (a) creates a sitemap-vs-served-URL mismatch that
# Screaming Frog reports as redirect-then-content (sometimes dropping
# H1/H2 extraction from the destination), and (b) splits SEO authority
# between two URL variants until Google picks a canonical.
# pretty_urls = false makes /about serve dist/about/index.html directly
# without redirecting. /about/ continues to work the same way (Netlify
# auto-resolves directory index for either form). Single URL throughout
# the stack.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

[functions]
  directory = "netlify/functions"

# 301-redirect the Netlify-assigned hostname to the canonical custom domain.
# Must appear BEFORE the SPA fallback below (Netlify takes the first match).
# `force = true` is required so the redirect fires even when matching content exists.
[[redirects]]
  from = "https://canyonstate.netlify.app/*"
  to = "https://canyonstateaz.com/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────────────
# Legacy URL redirects — old paths from the previous site that still get
# inbound traffic / backlinks / indexed pages. Each 301 consolidates SEO
# authority into a live equivalent. `force = true` ensures Netlify fires the
# redirect before the SPA fallback below catches the request.
#
# Order: most-specific paths first. The SPA fallback at the bottom catches
# everything else.
# ─────────────────────────────────────────────────────────────────────────────

# Legacy /services/* paths (services index covers what doesn't have a peer)
[[redirects]]
  from = "/services/sparkletts-water"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/services/block"
  to = "/services/masonry"
  status = 301
  force = true

[[redirects]]
  from = "/services/construction"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/services/remodeling"
  to = "/services/general-contracting"
  status = 301
  force = true

[[redirects]]
  from = "/services/consulting"
  to = "/contact"
  status = 301
  force = true

# Legacy form-success page from the old Sparkletts inquiry funnel
[[redirects]]
  from = "/thank-you-sparkletts-water"
  to = "/thank-you"
  status = 301
  force = true

[[redirects]]
  from = "/thank-you-sparkletts-water/*"
  to = "/thank-you"
  status = 301
  force = true

# Legacy CMS author archive (old WordPress-style URL)
[[redirects]]
  from = "/author/meld"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/author/meld/*"
  to = "/about"
  status = 301
  force = true

# Legacy top-level service paths (now live under /services/*)
[[redirects]]
  from = "/roofing"
  to = "/services/roofing"
  status = 301
  force = true

[[redirects]]
  from = "/HVAC"
  to = "/services/hvac"
  status = 301
  force = true

[[redirects]]
  from = "/hvac"
  to = "/services/hvac"
  status = 301
  force = true

[[redirects]]
  from = "/construction"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/remodeling"
  to = "/services/general-contracting"
  status = 301
  force = true

[[redirects]]
  from = "/consulting"
  to = "/contact"
  status = 301
  force = true

# About — canonical short form
[[redirects]]
  from = "/about-us"
  to = "/about"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────────────
# SPA fallback — must remain LAST. Anything not matched above renders the
# React app, which then handles client-side routing.
# ─────────────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP allowlist by service:
    #   - GTM / GA4:        *.googletagmanager.com, *.google-analytics.com, *.analytics.google.com
    #   - Google Ads (the 5 conversion + remarketing tags in container GTM-NDBJ277C):
    #       *.googleadservices.com (conversion linker + remarketing scripts)
    #       *.doubleclick.net      (googleads.g.doubleclick.net, stats.g.doubleclick.net,
    #                               td.doubleclick.net — pixels, scripts, and frames)
    #       www.google.com         (Google Ads conversion pixel + remarketing endpoints)
    #   - Resend (contact form): api.resend.com (connect-src only)
    #   - Bunny CDN (hero video): cse-media.b-cdn.net (media-src only)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.googletagmanager.com https://*.google-analytics.com https://*.googleadservices.com https://*.doubleclick.net https://www.google.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; media-src 'self' https://cse-media.b-cdn.net; connect-src 'self' https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://*.googletagmanager.com https://*.doubleclick.net https://*.googleadservices.com https://www.google.com https://api.resend.com; frame-src 'self' https://*.doubleclick.net https://*.googletagmanager.com; frame-ancestors 'none'"
